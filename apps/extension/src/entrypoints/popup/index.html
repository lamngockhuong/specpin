<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specpin</title>
    <style>
      /* Tokens are imported in main.ts (src/shared/tokens.gen.css). All visual
         values below reference --sp-* vars; the radial backdrop + accent glow
         + dark theme come from those tokens. */
      * { box-sizing: border-box; }
      body {
        width: 400px;
        margin: 0;
        padding: 16px;
        font: 13px/1.45 var(--sp-font-ui);
        color: var(--sp-text);
        background:
          radial-gradient(120% 80% at 50% 0%, var(--sp-grad-top), var(--sp-grad-bottom));
      }
      .header { display: flex; align-items: center; gap: 8px; }
      .logo { width: 22px; height: 22px; display: block; }
      /* .icon-btn (header settings gear) lives in shared/icon-btn.css. */
      h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
      .pill {
        font: 500 11px/1 var(--sp-font-mono);
        color: var(--sp-text-3);
        background: var(--sp-control);
        border: 1px solid var(--sp-border);
        border-radius: 999px;
        padding: 4px 8px;
      }
      a.pill { text-decoration: none; cursor: pointer; }
      a.pill:hover { color: var(--sp-text-2); border-color: var(--sp-accent); }
      .row { display: flex; align-items: center; justify-content: space-between; }
      .status { margin-top: 14px; }
      .status > span { display: inline-flex; align-items: center; gap: 8px; }
      /* The status row carries only the informational states; when those are
         absent (a project serves the page) the text is blank and the row
         collapses, like #count:empty / #projects:empty below. */
      .status:has(#status-text:empty) { display: none; }

      /* Global on/off toggle for ALL spec sources (sidecar + manual). On its own
         row, separate from the connection status, so it does not read as a
         sidecar-only control. */
      .toggle-row { margin-top: 10px; }
      .toggle-row label { color: var(--sp-text-2); font-weight: 500; cursor: pointer; }

      /* On/off toggle switch is shared via src/shared/switch.css (.switch). */

      .meta {
        margin-top: 14px; padding-top: 14px;
        border-top: 1px solid var(--sp-border);
        justify-content: flex-end; /* the lone count pill sits at the right */
      }
      #count:empty { display: none; }

      /* Per-tab project list (distinct from the spec list: no pin marker). */
      #projects { margin: 8px 0 0; }
      #projects:empty { display: none; }
      #projects li { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
      #projects li::before { display: none; }
      #projects .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--sp-text-3); flex: none; }
      #projects .pdot.ok { background: var(--sp-success-dot); }
      #projects .pdot.err { background: var(--sp-error-text); }
      #projects .pname { font-weight: 600; color: var(--sp-text); }
      #projects .pcount { color: var(--sp-text-3); font-family: var(--sp-font-mono); font-size: 11px; }

      /* Language + Display mode: matching label rows sharing one select look. */
      .locale-row, .mode-row { margin-top: 12px; }
      .locale-row[hidden], .mode-row[hidden] { display: none; }
      .locale-row label, .mode-row label { color: var(--sp-text-2); font-weight: 500; }
      /* Equal fixed width so the two selects align (a native select otherwise
         auto-sizes to its widest option, making the pair diverge). */
      #locale, #mode {
        width: 128px;
        padding: 7px 10px;
        font: 500 12px/1 var(--sp-font-ui);
        border: 1px solid var(--sp-border);
        border-radius: var(--sp-radius-control);
        background: var(--sp-control);
        color: var(--sp-text);
        cursor: pointer;
      }

      /* Single hairline fencing the browse zone (filters + search + list) off
         from the controls above. Hidden with the other list controls when off. */
      .list-divider { border: 0; border-top: 1px solid var(--sp-border); margin: 16px 0 0; }
      .list-divider[hidden] { display: none; }

      /* Facet filter checklist (shared markup with the side panel). */
      .filters { margin-top: 12px; }
      .filters[hidden] { display: none; }
      .filter-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
      .filter-title { font: 600 11px/1 var(--sp-font-ui); text-transform: uppercase; letter-spacing: 0.06em; color: var(--sp-text-3); }
      .filter-reset { font-size: 11px; }
      .filter-group { margin-top: 6px; }
      .filter-group > summary { cursor: pointer; font-weight: 600; color: var(--sp-text-2); padding: 4px 0; list-style: revert; }
      .filter-row { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 6px; }
      .filter-row input { flex: none; margin: 0; cursor: pointer; }
      .filter-name { flex: 1; color: var(--sp-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .filter-count { color: var(--sp-text-3); font-family: var(--sp-font-mono); font-size: 11px; }
      .filter-marker { font: 600 9px/1 var(--sp-font-mono); text-transform: uppercase; padding: 2px 4px; border-radius: 4px; border: 1px solid var(--sp-border); color: var(--sp-text-3); }
      .filter-marker-you { color: var(--sp-accent); border-color: var(--sp-accent); }

      /* Page match-health + fragile-scan CSS is shared via shared/surface-health.css
         (imported in main.ts); only the surface-specific top margin lives here. */
      .health { margin-top: 12px; }

      /* Spec search box: client-side filter over the loaded list. */
      #search {
        width: 100%; margin-top: 12px; padding: 8px 10px;
        font: 500 12px/1.3 var(--sp-font-ui);
        color: var(--sp-text); background: var(--sp-control);
        border: 1px solid var(--sp-border); border-radius: var(--sp-radius-control);
      }
      #search:focus { outline: none; border-color: var(--sp-accent); box-shadow: 0 0 0 3px var(--sp-accent-glow); }
      #search::placeholder { color: var(--sp-text-3); }

      ul { list-style: none; margin: 12px 0; padding: 0; max-height: 220px; overflow-y: auto; overflow-x: hidden; }
      li {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 10px;
        padding: 7px 0;
      }
      li::before {
        content: ""; grid-row: 1 / span 2; grid-column: 1;
        width: 15px; height: 15px; margin-top: 1px;
        background: var(--sp-accent);
        -webkit-mask: var(--pin) center / contain no-repeat;
        mask: var(--pin) center / contain no-repeat;
        --pin: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>');
      }
      li .t { grid-column: 2; min-width: 0; font-weight: 600; color: var(--sp-text); display: flex; align-items: center; gap: 6px; }
      li .muted { grid-column: 2; min-width: 0; color: var(--sp-text-3); font-family: var(--sp-font-mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* Provenance badge: which source a spec came from (sidecar vs manual). */
      .src {
        flex: none;
        font: 600 9px/1 var(--sp-font-mono);
        text-transform: uppercase; letter-spacing: 0.04em;
        padding: 2px 5px; border-radius: 4px;
        border: 1px solid var(--sp-border); color: var(--sp-text-3);
      }
      .src-sidecar { color: var(--sp-accent); border-color: var(--sp-accent); }
      #specs li.spec { cursor: pointer; border-radius: var(--sp-radius-control); padding: 7px 6px; margin: 0 -6px; }
      #specs li.spec:hover { background: var(--sp-control); }
      li.muted { display: block; color: var(--sp-text-3); padding: 10px 0; }
      li.muted::before { display: none; }

      .actions { display: flex; gap: 8px; margin-top: 12px; }
      .actions[hidden] { display: none; }
      button {
        padding: 9px 10px;
        font: 600 13px/1 var(--sp-font-ui);
        border: 1px solid var(--sp-border);
        border-radius: var(--sp-radius-control);
        background: var(--sp-control);
        color: var(--sp-text);
        cursor: pointer; transition: filter 0.12s;
      }
      button:hover { filter: brightness(0.97); }
      /* Only the action buttons share the row width; other buttons stay
         content-sized (icon gear, link buttons, filter reset). */
      .actions > button { flex: 1; }
      #capture {
        background: var(--sp-accent);
        border-color: var(--sp-accent);
        color: var(--sp-accent-on);
        box-shadow: 0 0 0 4px var(--sp-accent-glow);
      }
      #capture:hover { background: var(--sp-accent-hover); border-color: var(--sp-accent-hover); filter: none; }
    </style>
  </head>
  <body>
    <div class="header">
      <img class="logo" src="/icon/128.png" alt="" />
      <h1 data-i18n="common.specpin">Specpin</h1>
      <a class="pill" id="version" href="https://specpin.ohnice.app/changelog" target="_blank" rel="noopener noreferrer" data-i18n-title="common.viewChangelog" data-i18n-aria="common.viewChangelog" title="View changelog" aria-label="View changelog"></a>
      <div class="header-actions">
      <button type="button" id="new-project" class="icon-btn" hidden data-i18n-title="popup.newProject" data-i18n-aria="popup.newProject" title="New project" aria-label="New project">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <button type="button" id="export" class="icon-btn" hidden data-i18n-title="popup.exportLocal" data-i18n-aria="popup.exportLocal" title="Export local specs" aria-label="Export local specs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button type="button" id="open-sidepanel" class="icon-btn" hidden data-i18n-title="popup.openSidepanel" data-i18n-aria="popup.openSidepanel" title="Open as side panel" aria-label="Open as side panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
        </svg>
      </button>
      <button type="button" id="open-options" class="icon-btn" data-i18n-title="common.connectionSettings" data-i18n-aria="common.connectionSettings" title="Connection settings" aria-label="Connection settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </button>
      </div>
    </div>
    <div class="row status">
      <span><span id="status-text" data-i18n="common.loading">Loading&hellip;</span></span>
    </div>
    <div class="row toggle-row">
      <label for="enabled" data-i18n="common.showSpecsLabel">Show specs on this page</label>
      <input type="checkbox" id="enabled" class="switch" data-i18n-aria="common.showSpecsAria" aria-label="Show all Specpin specs on this page" />
    </div>
    <div class="row meta"><span id="count" class="pill"></span></div>
    <ul id="projects"></ul>
    <div id="digest" class="digest" hidden></div>
    <div class="row locale-row" id="locale-row" hidden>
      <label for="locale" data-i18n="common.languageLabel">Language</label>
      <select id="locale" data-i18n-title="common.specLanguageTitle" title="Spec language"></select>
    </div>
    <div class="row mode-row" id="mode-row">
      <label for="mode" data-i18n="common.displayModeTitle">Display mode</label>
      <select id="mode">
        <option value="" data-i18n="common.modePerSpec">Per-spec mode</option>
        <option value="tooltip" data-i18n="common.modeTooltip">Tooltip</option>
        <option value="sidebar" data-i18n="common.modeSidebar">Sidebar</option>
        <option value="modal" data-i18n="common.modeModal">Modal</option>
      </select>
    </div>
    <div class="actions" id="actions">
      <button id="capture" type="button" data-i18n="common.captureSpec">+ Capture spec</button>
    </div>
    <div id="add-project" hidden></div>
    <div id="guides" class="guides"></div>
    <hr id="list-divider" class="list-divider" />
    <div id="filters" class="filters" hidden></div>
    <div id="scope" hidden></div>
    <div id="health" class="health" hidden></div>
    <details id="scan" class="filter-group scan" hidden>
      <summary></summary>
      <div id="scan-results"></div>
    </details>
    <input type="search" id="search" data-i18n-placeholder="common.searchPlaceholder" data-i18n-aria="common.searchAria" placeholder="Search specs&hellip;" aria-label="Search specs" />
    <ul id="specs"></ul>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
