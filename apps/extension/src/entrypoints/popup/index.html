<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specpin</title>
    <style>
      body { width: 300px; margin: 0; padding: 12px; font: 13px/1.4 system-ui, sans-serif; color: #1f2937; }
      h1 { font-size: 15px; margin: 0 0 8px; }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; }
      .muted { color: #6b7280; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; background: #9ca3af; }
      .dot.ok { background: #16a34a; }
      .dot.off { background: #dc2626; }
      ul { list-style: none; margin: 8px 0; padding: 0; max-height: 200px; overflow: auto; }
      li { padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 4px; }
      li .t { font-weight: 600; }
      .actions { display: flex; gap: 6px; margin-top: 8px; }
      button { flex: 1; padding: 6px; border: 1px solid #d1d5db; border-radius: 6px; background: #f9fafb; cursor: pointer; }
      button:hover { background: #f3f4f6; }
      a { color: #4f46e5; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Specpin</h1>
    <div class="row">
      <span><span id="status-dot" class="dot"></span><span id="status-text">Loading…</span></span>
      <label><input type="checkbox" id="enabled" /> On</label>
    </div>
    <div class="row muted"><span id="project"></span><span id="count"></span></div>
    <ul id="specs"></ul>
    <div class="actions">
      <button id="reload">Reload</button>
      <button id="reconnect">Reconnect</button>
    </div>
    <div class="actions">
      <button id="capture">+ Capture spec</button>
      <select id="mode" title="Display mode">
        <option value="">Per-spec mode</option>
        <option value="tooltip">Tooltip</option>
        <option value="sidebar">Sidebar</option>
      </select>
    </div>
    <p class="muted" style="margin-top:8px"><a id="open-options">Connection settings →</a></p>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
