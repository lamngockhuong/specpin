<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specpin Settings</title>
    <style>
      /* Tokens imported in main.ts (src/shared/tokens.gen.css). */
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 48px 16px;
        font: 14px/1.5 var(--sp-font-ui);
        color: var(--sp-text);
        background:
          radial-gradient(110% 70% at 50% 0%, var(--sp-grad-top), var(--sp-grad-bottom)) fixed;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px;
        background: var(--sp-surface);
        border: 1px solid var(--sp-border);
        border-radius: var(--sp-radius-card);
      }
      h1 { font-size: 20px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.01em; }
      p.lead { color: var(--sp-text-2); margin: 0 0 24px; }
      label { display: block; margin: 18px 0 6px; font-weight: 600; color: var(--sp-text); }
      input {
        width: 100%; padding: 11px 12px;
        font: 13px/1.4 var(--sp-font-mono);
        color: var(--sp-text);
        background: var(--sp-elevated);
        border: 1px solid var(--sp-border);
        border-radius: var(--sp-radius-control);
      }
      input::placeholder { color: var(--sp-text-3); }
      input:focus {
        outline: none;
        border-color: var(--sp-accent);
        box-shadow: 0 0 0 3px var(--sp-accent-glow);
      }
      button {
        width: 100%; margin-top: 24px; padding: 12px 14px;
        font: 700 14px/1 var(--sp-font-ui);
        border: 1px solid var(--sp-accent);
        background: var(--sp-accent);
        color: var(--sp-accent-on);
        border-radius: var(--sp-radius-control);
        cursor: pointer;
        box-shadow: 0 0 0 4px var(--sp-accent-glow);
        transition: background 0.12s, border-color 0.12s;
      }
      button:hover { background: var(--sp-accent-hover); border-color: var(--sp-accent-hover); }
      #result {
        display: none;
        margin-top: 18px; padding: 12px 14px;
        border: 1px solid transparent;
        border-radius: var(--sp-radius-control);
        align-items: center; gap: 10px;
      }
      #result::before {
        content: ""; flex: none; width: 18px; height: 18px;
        background: currentColor;
        -webkit-mask: var(--icon) center / contain no-repeat;
        mask: var(--icon) center / contain no-repeat;
      }
      #result.ok {
        display: flex;
        color: var(--sp-success-text);
        background: var(--sp-success-bg);
        border-color: var(--sp-success-border);
        --icon: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>');
      }
      #result.err {
        display: flex;
        color: var(--sp-error-text);
        background: var(--sp-error-bg);
        border-color: var(--sp-error-border);
        --icon: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5v5"/><path d="M12 16h.01"/></svg>');
      }
      code {
        font: 12px/1 var(--sp-font-mono);
        background: var(--sp-control);
        color: var(--sp-text-2);
        padding: 2px 5px; border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Specpin connection</h1>
      <p class="lead">
        Run <code>specpin serve</code> in your project, then paste the printed URL and token here.
        Specpin attaches living docs to existing UIs; it does not generate code.
      </p>
      <label for="baseUrl">Sidecar URL</label>
      <input id="baseUrl" type="text" placeholder="http://127.0.0.1:PORT" />
      <label for="token">Token</label>
      <input id="token" type="text" placeholder="paste bearer token" />
      <button id="save" type="button">Test connection &amp; save</button>
      <div id="result"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
