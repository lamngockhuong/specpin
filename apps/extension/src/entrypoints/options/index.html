<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specpin Settings</title>
    <style>
      body { max-width: 520px; margin: 40px auto; padding: 0 16px; font: 14px/1.5 system-ui, sans-serif; color: #1f2937; }
      h1 { font-size: 18px; }
      p.lead { color: #6b7280; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      input { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font: inherit; }
      button { margin-top: 16px; padding: 8px 14px; border: 1px solid #4f46e5; background: #4f46e5; color: #fff; border-radius: 6px; cursor: pointer; }
      button:hover { background: #4338ca; }
      #result { margin-top: 14px; padding: 10px; border-radius: 6px; display: none; }
      #result.ok { display: block; background: #dcfce7; color: #166534; }
      #result.err { display: block; background: #fee2e2; color: #991b1b; }
      code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Specpin connection</h1>
    <p class="lead">
      Run <code>specpin serve</code> in your project, then paste the printed URL and token here.
      Specpin attaches living docs to existing UIs; it does not generate code.
    </p>
    <label for="baseUrl">Sidecar URL</label>
    <input id="baseUrl" type="text" placeholder="http://127.0.0.1:PORT" />
    <label for="token">Token</label>
    <input id="token" type="text" placeholder="paste the bearer token" />
    <button id="save">Test connection &amp; save</button>
    <div id="result"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
