name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS / TS (lint, typecheck, test, build, schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Cross-validator (ajv side): shared fixtures must agree with the schema.
      - run: pnpm schema-validate

  go:
    name: Go sidecar (vet, test, build, schema drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # Fail if the embedded schema drifted from packages/spec-schema.
      - run: make check-schema
      - run: go vet ./...
      # Cross-validator (Go side): same shared fixture corpus as the JS job.
      - run: go test ./...
      - run: make build
