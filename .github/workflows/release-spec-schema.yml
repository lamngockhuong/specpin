name: Release Spec Schema

# Publishes @specpin/spec-schema to npm with provenance. Driven by release-please
# (workflow_call) on a merged release PR; also runnable manually
# (workflow_dispatch, with dry_run) or by pushing a `spec-schema-v*` tag.
# Requires the NPM_TOKEN secret (npm automation token, publish scope @specpin/*).

on:
  push:
    tags: ["spec-schema-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (npm publish --dry-run, publishes nothing)"
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Version from release-please"
        required: true
        type: string

concurrency:
  group: release-spec-schema-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dry_run: ${{ steps.v.outputs.dry_run }}
    steps:
      - name: Resolve version + dry_run
        id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run || 'false' }}"
          else
            # Tag push: refs/tags/spec-schema-v1.2.3 -> 1.2.3
            VERSION="${GITHUB_REF#refs/tags/spec-schema-v}"
            DRY_RUN="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "spec-schema release: version=$VERSION dry_run=$DRY_RUN"

  publish:
    name: Build + publish to npm
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @specpin/spec-schema build
      # Align the published version with the resolved version. release-please
      # already bumps package.json on the release commit; this also covers
      # tag-push and manual dispatch where HEAD may not carry the bump.
      - name: Set version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: packages/spec-schema
      - name: Publish (dry run)
        if: needs.prepare.outputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        working-directory: packages/spec-schema
      - name: Publish
        if: needs.prepare.outputs.dry_run != 'true'
        run: npm publish --provenance --access public
        working-directory: packages/spec-schema
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
