name: Release Extension

# Builds the WXT extension (chrome + firefox), zips, checksums, and publishes a
# GitHub Release. Driven by release-please (workflow_call) on a merged release PR;
# also runnable manually (workflow_dispatch, with dry_run) or by pushing an
# `extension-v*` tag.

on:
  push:
    tags: ["extension-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build only, skip the GitHub Release)"
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Version from release-please"
        required: true
        type: string

concurrency:
  group: release-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dry_run: ${{ steps.v.outputs.dry_run }}
    steps:
      - name: Resolve version + dry_run
        id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run || 'false' }}"
          else
            # Tag push: refs/tags/extension-v1.2.3 -> 1.2.3
            VERSION="${GITHUB_REF#refs/tags/extension-v}"
            DRY_RUN="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "extension release: version=$VERSION dry_run=$DRY_RUN"

  build:
    name: Build + zip
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build only the extension's workspace deps (spec-schema, api-client,
      # fingerprint-core); `wxt zip` builds the extension itself. Avoids building
      # apps/web, which is released separately via web-deploy.yml.
      - run: pnpm --filter "@specpin/extension^..." build
      - name: Zip chrome + firefox
        run: |
          pnpm --filter @specpin/extension run zip
          pnpm --filter @specpin/extension run zip:firefox
      - name: Collect assets + checksums
        run: |
          mkdir -p release
          # Attach the chrome + firefox zips only; skip WXT's auto sources.zip.
          cp apps/extension/.output/specpin-*-chrome.zip release/
          cp apps/extension/.output/specpin-*-firefox.zip release/
          cd release && sha256sum specpin-*.zip > checksums.txt
      - uses: actions/upload-artifact@v7
        with:
          name: extension-release-assets
          path: release/*
          retention-days: 1

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.dry_run != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extension-release-assets
          path: release
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: extension-v${{ needs.prepare.outputs.version }}
          name: extension-v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: release/*
